version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: weelink_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: weelink
      POSTGRES_PASSWORD: weelink_pass_2025
      POSTGRES_DB: weelink_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/backup:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weelink -d weelink_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: weelink_redis
    restart: unless-stopped
    command: redis-server --requirepass weelink_redis_2025 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "weelink_redis_2025", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: weelink_postgres_data
  redis_data:
    name: weelink_redis_data
