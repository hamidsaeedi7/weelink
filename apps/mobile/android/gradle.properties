org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Djava.net.preferIPv4Stack=true
# اجرای کامپایلر Kotlin در همان پروسه گریدل — دور زدن خطای
# "Unable to establish loopback connection" که با نرم‌افزارهای VPN/پراکسی روی این سیستم رخ می‌داد
kotlin.compiler.execution.strategy=in-process
# غیرفعال کردن Gradle Daemon: خطای "Unable to establish loopback connection" از تلاش کلاینت
# گریدل برای اتصال به پروسه daemon جدا (از طریق سوکت AF_UNIX که روی این سیستم توسط
# نرم‌افزار VPN/پراکسی مسدود می‌شود) می‌آید؛ بدون daemon این IPC اصلاً لازم نیست
org.gradle.daemon=false
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
