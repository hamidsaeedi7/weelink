worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    client_max_body_size 20M;
    server_tokens off;

    # SSL session cache so ArvanCloud handshakes are reused (reduces cold 504s)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/m;
    limit_req_status 429;

    server {
        listen 80;
        listen 443 ssl;
        http2 on;
        server_name weeelink.ir www.weeelink.ir;

        ssl_certificate     /etc/letsencrypt/live/weeelink.ir/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/weeelink.ir/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        location = /38080424.txt {
            return 200 '';
            add_header Content-Type text/plain;
        }

        location /_next/static/ {
            proxy_pass http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            proxy_pass http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }
    }
    server {
        listen 80;
        listen 443 ssl;
        http2 on;
        server_name api.weeelink.ir;

        ssl_certificate     /etc/letsencrypt/live/weeelink.ir/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/weeelink.ir/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location /api/v1/auth/ {
            limit_req zone=auth_zone burst=5 nodelay;
            proxy_pass http://api:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        location / {
            limit_req zone=api_zone burst=30 nodelay;
            proxy_pass http://api:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }
    }
    server {
        listen 80;
        listen 443 ssl;
        http2 on;
        server_name modir.weeelink.ir;

        ssl_certificate     /etc/letsencrypt/live/weeelink.ir/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/weeelink.ir/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location /_next/static/ {
            proxy_pass http://admin:3001;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            proxy_pass http://admin:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }
    }

    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        http2 on;
        server_name _;
        ssl_certificate     /etc/letsencrypt/live/weeelink.ir/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/weeelink.ir/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        location / {
            proxy_pass http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
