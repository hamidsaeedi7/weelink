gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript
           application/rss+xml application/atom+xml image/svg+xml;

proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Upgrade           $http_upgrade;
proxy_set_header Connection        "upgrade";
proxy_read_timeout                 60s;
proxy_connect_timeout              10s;

client_max_body_size 20m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name weeelink.ir www.weeelink.ir api.weeelink.ir modir.weeelink.ir;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── weeelink.ir (web / Next.js) ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name weeelink.ir www.weeelink.ir;

    ssl_certificate     /etc/letsencrypt/live/weeelink.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/weeelink.ir/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options        "SAMEORIGIN"                               always;
    add_header X-Content-Type-Options "nosniff"                                  always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"          always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    location /_next/static/ {
        proxy_pass http://web:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /public/ {
        proxy_pass http://web:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        proxy_pass http://web:3000;
    }
}

# ── modir.weeelink.ir (admin panel) ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name modir.weeelink.ir;

    ssl_certificate     /etc/letsencrypt/live/weeelink.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/weeelink.ir/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options        "DENY"    always;
    add_header X-Content-Type-Options "nosniff" always;

    location /_next/static/ {
        proxy_pass http://admin:3001;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://admin:3001;
    }
}

# ── api.weeelink.ir ───────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.weeelink.ir;

    ssl_certificate     /etc/letsencrypt/live/weeelink.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/weeelink.ir/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://api:4000;
    }
}
